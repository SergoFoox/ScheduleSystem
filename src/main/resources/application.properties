server.port=${PORT:8080}
logging.level.org.atmosphere=warn

# Launch the default browser when starting the application in development mode
vaadin.launch-browser=true

# To improve the performance during development.
vaadin.allowed-packages=com.vaadin,org.vaadin,com.flowingcode,com.sergofoox

# Database configuration - PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/asms}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driverClassName=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# SQL Initialization (schema only; templates are imported by the user)
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/migration/V1__Initial_Schema.sql,classpath:db/migration/V5__Autosave_Table.sql,classpath:db/migration/V6__Add_Manual_Flag.sql,classpath:db/migration/V7__Add_Schedule_Id_To_Autosave.sql,classpath:db/migration/V8__Add_Autosave_Toggle_To_Schedule.sql,classpath:db/migration/V9__Add_Archived_To_Teacher.sql

# Flyway configuration
spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration


# Timefold Solver configuration is defined in SolverConfiguration.java
